query StorefrontKitCollections {
  birtvisi: collection(handle: "birtvisi-package-includes") {
    handle
    products(first: 10) { nodes { handle title } }
  }
  tobavarchkhili: collection(handle: "tobavarchkhili-includes") {
    handle
    products(first: 10) { nodes { handle title } }
  }
  borjomi: collection(handle: "ბორჯომის-ეროვნული-პარკის-კომპლექტი") {
    handle
    products(first: 10) { nodes { handle title } }
  }
  trailPackages: collection(handle: "trail-packages") {
    products(first: 5) {
      nodes {
        handle
        includedCollection: metafield(namespace: "custom", key: "included_collection") {
          reference {
            ... on Collection {
              handle
              products(first: 10) { nodes { handle title } }
            }
          }
        }
        includedItems: metafield(namespace: "custom", key: "included_items") { value }
      }
    }
  }
}
