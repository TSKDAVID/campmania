mutation LinkBorjomiPackageComplete {
  addToTrailPackages: collectionAddProducts(
    id: "gid://shopify/Collection/655119417636"
    productIds: ["gid://shopify/Product/10513638261028"]
  ) {
    collection {
      id
      productsCount {
        count
      }
    }
    userErrors {
      field
      message
    }
  }

  borjomiMetafield: productUpdate(
    input: {
      id: "gid://shopify/Product/10513638261028"
      metafields: [
        {
          namespace: "custom"
          key: "included_collection"
          value: "gid://shopify/Collection/655429009700"
          type: "collection_reference"
        }
      ]
    }
  ) {
    product {
      id
      handle
      metafield(namespace: "custom", key: "included_collection") {
        value
        reference {
          ... on Collection {
            handle
            title
          }
        }
      }
    }
    userErrors {
      field
      message
    }
  }

  borjomiVariant: productVariantsBulkUpdate(
    productId: "gid://shopify/Product/10513638261028"
    variants: [{id: "gid://shopify/ProductVariant/55124941013284", price: "35.00"}]
  ) {
    productVariants {
      id
      price
    }
    userErrors {
      field
      message
    }
  }

  borjomiPublish: publishablePublish(
    id: "gid://shopify/Product/10513638261028"
    input: [{publicationId: "gid://shopify/Publication/313167315236"}]
  ) {
    publishable {
      ... on Product {
        id
        handle
      }
    }
    userErrors {
      field
      message
    }
  }

  borjomiKitPublish: publishablePublish(
    id: "gid://shopify/Collection/655429009700"
    input: [{publicationId: "gid://shopify/Publication/313167315236"}]
  ) {
    publishable {
      ... on Collection {
        id
        handle
      }
    }
    userErrors {
      field
      message
    }
  }
}
