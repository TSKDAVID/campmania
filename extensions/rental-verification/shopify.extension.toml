api_version = "2025-07"

[[extensions]]
type = "ui_extension"
name = "Rental verification"
handle = "rental-verification"

uid = "a2c85fbf-d611-66e2-47e7-f4dae3990a24eb793021"

[[extensions.targeting]]
module = "./src/HeaderBanner.tsx"
target = "purchase.checkout.header.render-after"

[[extensions.targeting]]
module = "./src/PaymentBlock.tsx"
target = "purchase.checkout.payment-method-list.render-before"

[extensions.capabilities]
api_access = true
network_access = true

[extensions.settings]
[[extensions.settings.fields]]
key = "storefront_api_origin"
type = "single_line_text_field"
name = "Storefront API origin"
description = "Oxygen HTTPS URL (e.g. https://campmania-xxx.o2.myshopify.dev)"

[[extensions.settings.fields]]
key = "checkout_extension_secret"
type = "single_line_text_field"
name = "Checkout extension secret"
description = "Must match CHECKOUT_EXTENSION_SECRET on Oxygen"
